name: Build Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # Trigger nur bei Tags im Format vX.Y.Z

permissions:
  contents: write   # wichtig für Release-Upload
#  packages: write   # falls du Composer-Pakete pushen würdest
#  id-token: write   # für OIDC (z. B. wenn du Secrets nutzt)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup PHP 8
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # 3. Composer install
      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader

      # 4. Generate module_descriptor.json und .env
      - name: Generate config files
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          sed "s/{{VERSION}}/$VERSION/g" build/module_descriptor.json > module_descriptor.json
          echo "VERSION=$VERSION" > .env

      # 5. Pack alles in ZIP
      - name: Create zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          mkdir -p dist/bankimport
          rsync -av --exclude 'dist' --exclude '.git' --exclude '.github' --exclude 'build' ./ dist/bankimport/
          cd dist
          zip -r ../module_bankimport-$VERSION.zip bankimport

      # 6. Release mit ZIP
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: module_bankimport-*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
